# Deploy real na Vercel: build completo no Ubuntu (npm + next build) e upload com --prebuilt.
# O builder Git integrado do projeto estava concluindo em ~130ms sem instalar deps (saída vazia → 404).
#
# Secrets no GitHub (Settings → Secrets → Actions):
#   VERCEL_TOKEN      — https://vercel.com/account/tokens (conta com acesso ao time do projeto)
#   VERCEL_ORG_ID     — Deve começar com team_ (Team Settings → Team ID). NÃO use o slug "areticons-projects".
#   VERCEL_PROJECT_ID — Deve começar com prj_ (Project → Settings → General → Project ID).
#                       NÃO use o nome "donaire-squad" nem Deployment ID (dpl_...).
# Obter IDs certos: na Vercel abra o projeto donaire-squad → Settings → General, ou rode
#   npx vercel link  (escolha o time e o projeto donaire-squad) e copie .vercel/project.json
#
# vercel.json tem ignoreCommand "exit 0": o deploy automático pelo Git na Vercel NÃO roda build
# (evita o deploy vazio ~3s sobrescrever o deploy bom do Actions). O workflow abaixo continua usando
# vercel pull / build / deploy normalmente (CLI não aplica esse skip da mesma forma).

name: Vercel Production

on:
  push:
    branches:
      - master

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Checar formato dos secrets (sem revelar valores)
        run: |
          set -e
          if [ -z "${VERCEL_TOKEN:-}" ]; then echo "::error::VERCEL_TOKEN vazio"; exit 1; fi
          if [ -z "${VERCEL_ORG_ID:-}" ]; then echo "::error::VERCEL_ORG_ID vazio"; exit 1; fi
          if [ -z "${VERCEL_PROJECT_ID:-}" ]; then echo "::error::VERCEL_PROJECT_ID vazio"; exit 1; fi
          case "$VERCEL_ORG_ID" in team_*) ;; *) echo "::warning::VERCEL_ORG_ID costuma começar com team_ — confira no Team Settings"; ;; esac
          case "$VERCEL_PROJECT_ID" in prj_*) ;; *) echo "::warning::VERCEL_PROJECT_ID costuma começar com prj_ — use o ID em Project → Settings → General"; ;; esac

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Forçar raiz do repo no build (corrige Root Directory errado no painel)
        run: |
          node <<'NODE'
          const fs = require("fs");
          const p = ".vercel/project.json";
          if (!fs.existsSync(p)) {
            console.error("Missing .vercel/project.json after vercel pull");
            process.exit(1);
          }
          const j = JSON.parse(fs.readFileSync(p, "utf8"));
          j.settings = j.settings || {};
          j.settings.rootDirectory = null;
          j.settings.outputDirectory = null;
          j.settings.framework = "nextjs";
          fs.writeFileSync(p, JSON.stringify(j, null, 2));
          console.log("Patched .vercel/project.json:", JSON.stringify(j.settings, null, 2));
          NODE

      - name: Build (Vercel)
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy prebuilt
        run: vercel deploy --prebuilt --prod --yes --token=$VERCEL_TOKEN
